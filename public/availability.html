<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Availability Grid - Glimbaro Guest House</title>

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://www.gstatic.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https: blob:;
    connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com;
    base-uri 'self';
    form-action 'self';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="dns-prefetch" href="//www.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">

  <style>
    /* ── Page layout ─────────────────────────────────────────── */
    .sub-page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .sub-page-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      flex: 1;
    }
    .sub-page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0;
    }
    .sub-page-main {
      padding: 20px;
      max-width: 100%;
    }

    /* ── Home / back button ──────────────────────────────────── */
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-md);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-medium);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      font-family: var(--font-family);
      transition: background 0.15s;
    }
    .home-btn:hover { background: var(--border-light); }

    /* ── Toolbar strip ───────────────────────────────────────── */
    .avail-toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
    }
    .avail-toolbar label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .avail-toolbar input[type="date"] {
      padding: 6px 10px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      font-family: var(--font-family);
    }
    .avail-toolbar input[type="text"] {
      padding: 6px 10px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      font-family: var(--font-family);
      width: 180px;
    }
    .avail-toolbar-spacer { flex: 1; }

    /* ── Legend ──────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Grid wrapper ────────────────────────────────────────── */
    .grid-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
    }
    .grid-wrapper.collapsed { display: none; }

    /* ── Availability table ──────────────────────────────────── */
    .availability-grid-table {
      border-collapse: collapse;
      font-size: 12px;
      min-width: 100%;
      white-space: nowrap;
    }
    .availability-grid-table th,
    .availability-grid-table td {
      padding: 6px 8px;
      border: 1px solid var(--border-light);
      text-align: center;
    }
    .availability-grid-table th {
      background: var(--bg-tertiary);
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 11px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .availability-grid-table td:first-child {
      font-weight: 700;
      background: var(--bg-tertiary);
      position: sticky;
      left: 0;
      z-index: 1;
      color: var(--text-primary);
    }
    .availability-grid-table th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
    }
    .cell-available { background: #f0fdf4; }
    [data-theme="dark"] .cell-available { background: #052e16; }
    .guest-btn {
      display: block;
      width: 100%;
      padding: 3px 5px;
      border-radius: 4px;
      border: none;
      font-size: 11px;
      font-weight: 500;
      cursor: default;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 90px;
      font-family: var(--font-family);
    }
    .guest-btn.paid    { background: #d1fae5; color: #065f46; }
    .guest-btn.partial { background: #fef3c7; color: #92400e; }
    .guest-btn.unpaid  { background: #fee2e2; color: #991b1b; }
    [data-theme="dark"] .guest-btn.paid    { background: #064e3b; color: #6ee7b7; }
    [data-theme="dark"] .guest-btn.partial { background: #78350f; color: #fcd34d; }
    [data-theme="dark"] .guest-btn.unpaid  { background: #7f1d1d; color: #fca5a5; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .page-spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 48px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .spinner-ring {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border-light);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Bottom bar ──────────────────────────────────────────── */
    .sub-page-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--border-light);
      background: var(--bg-secondary);
      margin-top: 24px;
    }
    .row-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Print override ──────────────────────────────────────── */
    @media print {
      .sub-page-header,
      .avail-toolbar,
      .sub-page-footer { display: none !important; }
      .grid-wrapper { border: none; overflow: visible; }
      body { padding: 0; }
    }
  </style>
</head>
<body data-theme="light">

  <!-- ── Loading overlay ── -->
  <div class="auth-loading-overlay" id="authLoadingOverlay" role="status" aria-label="Verifying authentication">
    <div class="auth-loading-logo">
      <span class="material-icons" aria-hidden="true">hotel</span>
    </div>
    <div class="auth-loading-spinner" aria-hidden="true"></div>
    <p class="auth-loading-text">Verifying authentication...</p>
  </div>

  <!-- ── Top header ── -->
  <header class="sub-page-header">
    <a href="index.html" class="home-btn" title="Back to Dashboard">
      <span class="material-icons" style="font-size:18px;" aria-hidden="true">arrow_back</span>
      Dashboard
    </a>
    <div>
      <h1 class="sub-page-title">Availability Grid</h1>
      <p class="sub-page-subtitle">Glimbaro Guest House</p>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
      <button id="themeToggleBtn" class="btn-icon" title="Toggle Theme">
        <span id="themeIcon" class="material-icons">dark_mode</span>
      </button>
    </div>
  </header>

  <!-- ── Main content ── -->
  <main class="sub-page-main" id="mainContent">

    <!-- Toolbar -->
    <div class="avail-toolbar">
      <label for="startDate">From</label>
      <input type="date" id="startDate" />
      <label for="endDate">To</label>
      <input type="date" id="endDate" />
      <button id="loadGridBtn" class="btn btn-primary btn-sm">Generate Grid</button>

      <div class="avail-toolbar-spacer"></div>

      <input type="text" id="filterInput" placeholder="Filter by room or guest name..." />

      <div class="legend">
        <span><span class="legend-dot" style="background:#10b981;"></span> Paid</span>
        <span><span class="legend-dot" style="background:#f59e0b;"></span> Partial</span>
        <span><span class="legend-dot" style="background:#ef4444;"></span> Unpaid</span>
        <span><span class="legend-dot" style="background:#f0fdf4; border:1px solid #bbf7d0;"></span> Available</span>
      </div>

      <button id="toggleGridBtn" class="btn btn-secondary btn-sm">Collapse Table</button>
      <button id="printBtn" class="btn btn-secondary btn-sm">Print</button>
      <button id="csvBtn" class="btn btn-secondary btn-sm">Export CSV</button>
    </div>

    <!-- Spinner -->
    <div class="page-spinner" id="spinner">
      <div class="spinner-ring" aria-hidden="true"></div>
      <span>Loading availability data...</span>
    </div>

    <!-- Grid container -->
    <div class="grid-wrapper" id="gridWrapper">
      <div id="availabilityGrid" style="padding:4px;">
        <p style="text-align:center; padding:40px; color:var(--text-muted); font-size:14px;">
          Select a date range above and click Generate Grid.
        </p>
      </div>
    </div>

    <p id="rowCountLabel" class="row-count" style="margin-top:8px;"></p>

  </main>

  <!-- ── Bottom footer with home button ── -->
  <footer class="sub-page-footer">
    <a href="index.html" class="home-btn">
      <span class="material-icons" style="font-size:18px;" aria-hidden="true">home</span>
      Back to Dashboard
    </a>
    <span id="footerRowCount" class="row-count"></span>
  </footer>

  <script type="module" src="availability.js"></script>
</body>
</html>
